services:
  - type: web
    name: cyberguard-api-v2
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CX
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: PORT
        value: "8000"
      - key: HOST
        value: "0.0.0.0"
      - key: ENVIRONMENT
        value: "production"
